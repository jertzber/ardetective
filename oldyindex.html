<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassLink Quick Links</title>
  <base target="_top">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td {
      width: 25%;
      padding: 8px;
      text-align: center;
      vertical-align: top;
    }

    a {
      display: block;
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
    }

    @media (max-width: 900px) {
      td {
        display: block;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <table role="presentation">
      <tr>
        <td>
          <a href="https://help.classlink.com/s/launchpad-admin-cmc-home" target="_top" rel="noopener noreferrer">
            <img src="https://i.imgur.com/Wr88xi1.png" alt="CMC">
          </a>
        </td>

        <td>
          <a href="https://help.classlink.com/s/article/FAQ-for-Home-Users" target="_top" rel="noopener noreferrer">
            <img src="https://i.imgur.com/mY3mpFJ.png" alt="LaunchPad">
          </a>
        </td>

        <td>
          <a href="https://www.classlink.com/products/onesync" target="_top" rel="noopener noreferrer">
            <img src="https://i.imgur.com/ctNtQF2.png" alt="OneSync">
          </a>
        </td>

        <td>
          <a href="https://www.classlink.com/products/roster-server" target="_top" rel="noopener noreferrer">
            <img src="https://i.imgur.com/PrMd9WX.png" alt="Roster Server">
          </a>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
