<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docebo Iframe Link Test</title>
  <base target="_top">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
    }

    .wrap {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td {
      width: 25%;
      padding: 12px;
      vertical-align: top;
    }

    .card {
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      padding: 24px 16px;
      min-height: 140px;
      text-align: center;
      background: #f8f9fb;
    }

    .card p {
      margin: 0;
      font-size: 18px;
    }

    .card a {
      color: #0b5fff;
      text-decoration: underline;
      word-break: break-word;
    }

    @media (max-width: 900px) {
      td {
        display: block;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <table role="presentation">
      <tr>
        <td>
          <div class="card">
            <p><a href="https://www.classlink.com" target="_top">Test Link</a></p>
          </div>
        </td>
        <td>
          <div class="card">
            <p><a href="https://www.classlink.com" target="_top">Test Link</a></p>
          </div>
        </td>
        <td>
          <div class="card">
            <p><a href="https://www.classlink.com" target="_top">Test Link</a></p>
          </div>
        </td>
        <td>
          <div class="card">
            <p><a href="https://www.classlink.com" target="_top">Test Link</a></p>
          </div>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
