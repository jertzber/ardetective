<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassLink Buttons</title>
  <base target="_top">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td {
      width: 25%;
      padding: 16px;
      text-align: center;
      vertical-align: top;
    }

    a.button-link {
      display: inline-block;
      text-decoration: none;
    }

    a.button-link img {
      display: block;
      width: 100%;
      max-width: 520px;
      height: auto;
      border: 0;
    }

    @media (max-width: 900px) {
      td {
        display: block;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <table role="presentation">
      <tr>
        <td>
          <a class="button-link" href="https://www.classlink.com" target="_top">
            <img src="cmc.png"
                 alt="CMC"
                 onmouseover="this.src='cmc_hover.png';"
                 onmouseout="this.src='cmc.png';">
          </a>
        </td>

        <td>
          <a class="button-link" href="https://www.classlink.com" target="_top">
            <img src="launchpad.png"
                 alt="LaunchPad"
                 onmouseover="this.src='launchpad_hover.png';"
                 onmouseout="this.src='launchpad.png';">
          </a>
        </td>

        <td>
          <a class="button-link" href="https://www.classlink.com" target="_top">
            <img src="onesync.png"
                 alt="OneSync"
                 onmouseover="this.src='onesync_hover.png';"
                 onmouseout="this.src='onesync.png';">
          </a>
        </td>

        <td>
          <a class="button-link" href="https://www.classlink.com" target="_top">
            <img src="rosterserver.png"
                 alt="Roster Server"
                 onmouseover="this.src='rosterserver_hover.png';"
                 onmouseout="this.src='rosterserver.png';">
          </a>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
